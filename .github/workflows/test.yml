name: Test

on: [push]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python: [3.12, 3.13, 3.14, 3.14t]

    runs-on:  ubuntu-24.04

    steps:
    - uses: actions/checkout@v6

    - uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python }}

    - name: Install dependencies
      run: uv sync --all-extras

    - name: Lint
      run: uv run poe lint

    - name: Test
      run: uv run poe test
