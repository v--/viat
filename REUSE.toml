version = 1

[[annotations]]
path = [
  ".github/**.yml",
  ".gitignore",
  ".python-version",
  ".readthedocs.yaml",
  "poe_tasks.toml",
  "pyproject.toml",
  "src/**.py",
  "src/**/py.typed",
  "zensical.toml",

  # It seems appropriate to license the documentation separately, but software projects tend not to do that.
  "CHANGELOG.md",
  "docs/**.md",
  "docs/README.markdown",
  "README.md",
]
SPDX-FileCopyrightText = "Ianis Vasilev <ianis@ivasilev.net>"
SPDX-License-Identifier = "Unlicense"

# It seems appropriate to license the examples under CC0
[[annotations]]
path = [
  "examples/**",
]
SPDX-FileCopyrightText = "Ianis Vasilev <ianis@ivasilev.net>"
SPDX-License-Identifier = "CC0-1.0"

# The REUSE documentation suggests licensing generated files under CC0-1.0 with NONE as author.
# https://reuse.software/faq/#exclude-file
[[annotations]]
path = [
  "uv.lock",
]
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"
